spring.application.name=demo

spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/demo?createDatabaseIfNotExist=true}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}


jwt.secret=${JWT_SECRET:dev-secret-change-me-please-use-env-var-32chars}
arquivamento.path=${ARQUIVAMENTO_PATH:C:/Users/israel_erthal/Documents/israel/arquivos}

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:30MB}
server.tomcat.max-swallow-size=${MAX_REQUEST_SIZE:30MB}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL:true}
spring.mail.properties.mail.smtp.socketFactory.port=${MAIL_PORT:465}
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
